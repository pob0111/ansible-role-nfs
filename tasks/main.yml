---
# Include variables and define needed variables.
- name: Include OS-specific variables.
  ansible.builtin.include_vars: "{{ ansible_facts.os_family }}.yml"

- name: Include overrides specific to Fedora.
  ansible.builtin.include_vars: Fedora.yml
  when:
    - ansible_facts.os_family == 'RedHat'
    - ansible_facts.distribution == "Fedora"

# Setup/install tasks.
- name: Prepare RedHat host
  ansible.builtin.include_tasks: setup-RedHat.yml
  when: ansible_facts.os_family == 'RedHat'

- name: Prepare Debian host
  ansible.builtin.include_tasks: setup-Debian.yml
  when: ansible_facts.os_family == 'Debian'

- name: Ensure directories to export exist
  ansible.builtin.file:  # noqa risky-file-permissions
    path: "{{ item }}"
    state: directory
  with_items: "{{ nfs_exports | map('split') | map('first') | unique }}"

- name: Copy exports file.
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: '0644'
  notify: Reload nfs

- name: Ensure nfs is running.
  ansible.builtin.service:
    name: "{{ nfs_server_daemon }}"
    state: "started"
    enabled: true
  when: nfs_exports|length > 0
